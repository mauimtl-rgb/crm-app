<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Manager</title>

<style>
:root{
  --lime:#5eb459;
  --lime2:#7ddc78;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial;
}

body{
  min-height:100vh;
  background: radial-gradient(circle at top, #1a2a1a, #070b14 60%);
  color:white;
}

/* LOGIN GLASS */
#loginBox{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
}

.loginCard{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  border-radius:18px;
  padding:20px;
  width:280px;
  text-align:center;
}

/* MAIN */
.main{
  display:none;
  padding:25px;
}

/* CARDS */
.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(20px);
  border-radius:18px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

/* INPUTS */
input, select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.08);
  color:white;
  outline:none;
}

input::placeholder{
  color:rgba(255,255,255,0.6);
}

input:focus, select:focus{
  border:1px solid var(--lime);
  box-shadow:0 0 0 3px rgba(94,180,89,0.2);
}

/* BUTTONS */
button{
  padding:10px 14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  margin:3px;
}

.btn{
  background:linear-gradient(135deg,var(--lime),var(--lime2));
  color:#07130a;
}

.gray{
  background:rgba(255,255,255,0.1);
  color:white;
}

/* TABLE */
table{
  width:100%;
  border-collapse:separate;
  border-spacing:0 10px;
}

thead th{
  text-align:left;
  font-size:12px;
  opacity:0.6;
  padding:10px;
}

tbody tr{
  background:rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
}

td{
  padding:12px;
}

tbody tr td:first-child{
  border-radius:12px 0 0 12px;
}

tbody tr td:last-child{
  border-radius:0 12px 12px 0;
}

/* ACTION BUTTONS */
td button:first-child{
  background:rgba(94,180,89,0.25);
  color:#7ddc78;
}

td button:last-child{
  background:rgba(255,80,80,0.15);
  color:#ff8080;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <div class="loginCard">
    <h3>Login Required</h3>
    <button class="btn" id="loginBtn">Login with Google</button>
    <p id="statusText">Not logged in</p>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<div class="card">
<h3>Add Contact</h3>

<input id="firstName" placeholder="First Name">
<input id="lastName" placeholder="Last Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">

<select id="area">
  <option value="">Area</option>
  <option>ELA</option>
  <option>LA</option>
  <option>SGV</option>
  <option>Other</option>
</select>

<button class="btn" onclick="save()">Save</button>
<button class="gray" onclick="clearForm()">Clear</button>
</div>

<div class="card">
<h3>Contacts</h3>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Area</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth,
  signInWithPopup,
  signInWithRedirect,
  getRedirectResult,
  GoogleAuthProvider,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let editId = null;

/* LOGIN */
document.getElementById("loginBtn").onclick = async () => {
  const mobile = /iPhone|Android/i.test(navigator.userAgent);
  if (mobile) {
    await signInWithRedirect(auth, provider);
  } else {
    await signInWithPopup(auth, provider);
  }
};

getRedirectResult(auth);

/* AUTH STATE */
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById("loginBox").style.display = "none";
    document.querySelector(".main").style.display = "block";
    document.getElementById("statusText").innerText = user.email;
    render();
  } else {
    document.getElementById("loginBox").style.display = "flex";
    document.querySelector(".main").style.display = "none";
  }
});

/* SAVE */
window.save = async function () {

  let data = {
    firstName:firstName.value,
    lastName:lastName.value,
    phone:phone.value,
    email:email.value,
    area:area.value
  };

  if(editId){
    await updateDoc(doc(db,"contacts",editId), data);
    editId = null;
  } else {
    await addDoc(collection(db,"contacts"), data);
  }

  clearForm();
  render();
};

/* CLEAR */
window.clearForm = function(){
  firstName.value="";
  lastName.value="";
  phone.value="";
  email.value="";
  area.value="";
  editId=null;
};

/* EDIT */
window.edit = function(id,c){
  firstName.value=c.firstName;
  lastName.value=c.lastName;
  phone.value=c.phone;
  email.value=c.email;
  area.value=c.area;
  editId=id;
};

/* DELETE */
window.del = async function(id){
  await deleteDoc(doc(db,"contacts",id));
  render();
};

/* RENDER */
window.render = async function(){

  let t = document.getElementById("table");
  t.innerHTML="";

  let snap = await getDocs(collection(db,"contacts"));

  snap.forEach(d=>{
    let c=d.data();

    t.innerHTML += `
      <tr>
        <td>${c.firstName} ${c.lastName}</td>
        <td>${c.phone}</td>
        <td>${c.email}</td>
        <td>${c.area}</td>
        <td>
          <button onclick='edit("${d.id}", ${JSON.stringify(c)})'>Edit</button>
          <button onclick="del('${d.id}')">Delete</button>
        </td>
      </tr>
    `;
  });
};

</script>

</body>
</html>
