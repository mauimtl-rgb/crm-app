<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase CRM</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: Arial; }

body { background:#f1f5f9; }

.sidebar {
  position:fixed;
  left:0; top:0;
  width:220px;
  height:100%;
  background:#5eb459;
  color:white;
  padding:20px;
}

.main {
  margin-left:220px;
  padding:20px;
  display:none;
}

#loginBox {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:flex;
  justify-content:center;
  align-items:center;
}

.loginCard {
  background:white;
  padding:20px;
  border-radius:10px;
  width:260px;
  text-align:center;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:1px solid #ddd;
  border-radius:6px;
}

button {
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin:3px;
}

.btn { background:#5eb459; color:white; }
.gray { background:#e2e8f0; }

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <div class="loginCard">
    <h3>Login Required</h3>

    <button class="btn" id="loginBtn">Login with Google</button>
    <button class="gray" id="logoutBtn">Logout</button>

    <p id="statusText">Not logged in</p>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>CRM</h2>
</div>

<!-- MAIN -->
<div class="main">

<div class="card">
<h3>Add Contact</h3>

<input id="firstName" placeholder="First Name">
<input id="lastName" placeholder="Last Name">
<input id="organization" placeholder="Organization">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email">

<select id="area">
  <option value="">Area</option>
  <option>ELA</option>
  <option>LA</option>
  <option>SGV</option>
  <option>Other</option>
</select>

<button class="btn" onclick="saveContact()">Save</button>
<button class="gray" onclick="clearForm()">Clear</button>
</div>

<div class="card">
<h3>Contacts</h3>

<table>
<thead>
<tr>
<th>Name</th>
<th>Org</th>
<th>Phone</th>
<th>Email</th>
<th>Area</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getAuth,
  signInWithPopup,
  signInWithRedirect,
  getRedirectResult,
  GoogleAuthProvider,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyDv9ocKNfQ5KmfDIH88Qke7KdcO0XYoyW4",
  authDomain: "conatcts-a62a6.firebaseapp.com",
  projectId: "conatcts-a62a6",
  storageBucket: "conatcts-a62a6.firebasestorage.app",
  messagingSenderId: "8372784675",
  appId: "1:8372784675:web:9e9fafc39558db9b792b96"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* =========================
   FIX MOBILE LOGIN
========================= */
document.getElementById("loginBtn").onclick = async () => {

  const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);

  if (isMobile) {
    await signInWithRedirect(auth, provider);
  } else {
    await signInWithPopup(auth, provider);
  }
};

/* LOGOUT */
document.getElementById("logoutBtn").onclick = async () => {
  await signOut(auth);
};

/* HANDLE REDIRECT LOGIN */
getRedirectResult(auth)
  .then(result => {
    if (result?.user) {
      console.log("Login success (redirect)", result.user);
    }
  })
  .catch(err => console.log(err));

/* AUTH STATE */
onAuthStateChanged(auth, user => {

  if (user) {
    document.getElementById("loginBox").style.display = "none";
    document.querySelector(".main").style.display = "block";
    document.getElementById("statusText").innerText = "Logged in: " + user.email;
    render();
  } else {
    document.getElementById("loginBox").style.display = "flex";
    document.querySelector(".main").style.display = "none";
    document.getElementById("statusText").innerText = "Not logged in";
  }
});

/* STATE */
let editId = null;

/* SAVE */
window.saveContact = async function () {

  let c = {
    firstName:firstName.value,
    lastName:lastName.value,
    organization:organization.value,
    phone:phone.value,
    email:email.value,
    area:area.value
  };

  if(editId){
    await updateDoc(doc(db,"contacts",editId), c);
    editId = null;
  } else {
    await addDoc(collection(db,"contacts"), c);
  }

  clearForm();
  render();
};

/* CLEAR */
window.clearForm = function(){
  document.querySelectorAll("input").forEach(i=>i.value="");
  area.value="";
  editId=null;
};

/* EDIT */
window.edit = function(id,c){
  firstName.value=c.firstName;
  lastName.value=c.lastName;
  organization.value=c.organization;
  phone.value=c.phone;
  email.value=c.email;
  area.value=c.area;
  editId=id;
};

/* DELETE */
window.del = async function(id){
  await deleteDoc(doc(db,"contacts",id));
  render();
};

/* RENDER */
window.render = async function(){

  let t = document.getElementById("table");
  t.innerHTML = "";

  let snap = await getDocs(collection(db,"contacts"));

  snap.forEach(d => {

    let c = d.data();

    t.innerHTML += `
      <tr>
        <td>${c.firstName||""} ${c.lastName||""}</td>
        <td>${c.organization||""}</td>
        <td>${c.phone||""}</td>
        <td>${c.email||""}</td>
        <td>${c.area||""}</td>
        <td>
          <button onclick='edit("${d.id}", ${JSON.stringify(c)})'>Edit</button>
          <button onclick="del('${d.id}')">Delete</button>
        </td>
      </tr>
    `;
  });
};

</script>

</body>
</html>
